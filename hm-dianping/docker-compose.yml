services:
  mysql:
    image: mysql:8.0
    container_name: hmdp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123459
      MYSQL_DATABASE: hmdp
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - hmdp_mysql_data:/var/lib/mysql

  redis:
    image: redis:7.2-alpine
    container_name: hmdp-redis
    ports:
      - "6379:6379"
    volumes:
      - hmdp_redis_data:/data
    command: [ "redis-server", "--appendonly", "yes" ]
