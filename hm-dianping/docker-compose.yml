version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: hmdp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123459
      MYSQL_DATABASE: hmdp
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - hmdp_mysql_data:/var/lib/mysql

  redis:
    image: redis:7.2-alpine
    container_name: hmdp-redis
    ports:
      - "6379:6379"
    volumes:
      - hmdp_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

  backend:
    build:
      context: ./hm-dianping
      dockerfile: Dockerfile
    container_name: hmdp-backend
    depends_on:
      - mysql
      - redis
    ports:
      - "8081:8081"
    environment:
      TZ: Asia/Shanghai

  nginx:
    image: nginx:alpine
    container_name: hmdp-nginx
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      # 前端静态资源（仓库自带的静态页面）
      - ./hm-dianping/nginx-1.18.0/html:/usr/share/nginx/html:ro
      # nginx 反向代理配置
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  hmdp_mysql_data:
  hmdp_redis_data: