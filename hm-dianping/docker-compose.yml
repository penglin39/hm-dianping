  nginx:
    image: nginx:alpine
    container_name: hmdp-nginx
#    depends_on:
#      - backend
    ports:
      - "8080:8080"
    volumes:
      - ./nginx-1.18.0/html:/usr/share/nginx/html:ro
      - ./nginx-1.18.0/conf/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  hmdp_mysql_data:
  hmdp_redis_data: