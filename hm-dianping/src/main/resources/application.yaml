
services:
  redis:
    image: redis:7-alpine
    container_name: hm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

  mysql:
    image: mysql:8.0
    container_name: hm-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123459
      MYSQL_DATABASE: hm_dianping
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    container_name: hm-backend
    depends_on:
      - mysql
      - redis
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod

  frontend:
    build:
      context: ./frontend
    container_name: hm-frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  redis_data:
  mysql_data: